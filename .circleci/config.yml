version: '2.1'

jobs:
  build-push-main:
    working_directory: ~/circleci-frontend
    docker:
      - image: cimg/base:current-24.04
    steps:
      - checkout
      - setup_remote_docker:
          docker_layer_caching: true
      - run:
          name: Docker login registry.chapter3-it.io
          command: docker login -u $DOCKERHUB_USERNAME -p $DOCKERHUB_TOKEN registry.chapter3-it.io
      - run:
          name: Build image
          command: docker build -t registry.chapter3-it.io/my24service/frontend-main:latest .
      - run:
          name: Push image
          command: docker push registry.chapter3-it.io/my24service/frontend-main:latest
  build-push-develop:
    working_directory: ~/circleci-frontend
    docker:
      - image: cimg/base:current-24.04
    steps:
      - checkout
      - setup_remote_docker:
          docker_layer_caching: true
      - run:
          name: Docker login registry.chapter3-it.io
          command: docker login -u $DOCKERHUB_USERNAME -p $DOCKERHUB_TOKEN registry.chapter3-it.io
      - run:
          name: Build image
          command: docker build -t registry.chapter3-it.io/my24service/frontend-develop:latest .
      - run:
          name: Push image
          command: docker push registry.chapter3-it.io/my24service/frontend-develop:latest

workflows:
   version: 2
   build-main:
     jobs:
       - build-push-main:
           filters:
             branches:
               only: main
   build-develop:
     jobs:
       - build-push-develop:
           filters:
             branches:
               only: develop
